name: Build Wikipedia Tool (Multi-OS)

on: [push]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: WikiJsonTool-Windows
            extension: .exe
          - os: ubuntu-latest
            artifact_name: WikiJsonTool-Linux
            extension: ""
          - os: macos-latest
            artifact_name: WikiJsonTool-macOS
            extension: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libtk8.6

      - name: Install Python dependencies
        run: |
          pip install customtkinter mwxml mwparserfromhell requests pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --onefile --windowed --collect-all customtkinter --name "WikiJsonTool" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/WikiJsonTool${{ matrix.extension }}
